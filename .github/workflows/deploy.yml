name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, zip, bcmath

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via rsync
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          rsync -avzr --delete \
            --exclude='.env' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='node_modules' \
            --exclude='storage/logs' \
            --exclude='storage/framework/cache' \
            --exclude='storage/framework/sessions' \
            --exclude='storage/framework/views' \
            -e "ssh -i ~/.ssh/id_rsa -p ${PORT} -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}"

      - name: Run post-deploy commands
        run: |
          PORT="${{ secrets.SSH_PORT }}"
          PORT="${PORT:-22}"
          ssh -i ~/.ssh/id_rsa -p "${PORT}" -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash << 'ENDSSH'
            cd ${{ secrets.DEPLOY_PATH }}
            mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions storage/logs
            php artisan migrate --force
            php artisan db:seed --class=AiDocumentSeeder --force
            php artisan storage:link --force
          ENDSSH
